name: UI Tests

on: [push, pull_request] # Runs tests on every push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 19
        uses: actions/setup-java@v3
        with:
          java-version: '19'
          distribution: 'temurin'

      - name: Run Tests with Maven
        run: |
          mvn test -Denv=qa -Dheadless=true -Dusername=${{ secrets.APP_USERNAME }} -Dpassword=${{ secrets.APP_PASSWORD }}